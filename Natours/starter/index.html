<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        
        <link href="https://fonts.googleapis.com/css?family=Lato:100,300,400,700,900" rel="stylesheet">

        <link rel="stylesheet" href="css/icon-font.css">
        <link rel="stylesheet" href="css/style.css">
        <link rel="shortcut icon" type="image/png" href="img/favicon.png">
        
        <title>Natours | Exciting tours for adventurous people</title>
    </head>
    <body>
        <div class="hero">
            <div class="logo-box">
                <img src="img/logo-white.png" alt="" class="logo">
            </div>
            <div class="text-box">
                <h1>
                    <span class="title-main">outdoors</span>
                    <span class="title-sub">is where life happens</span>
                </h1>
                <a href="#" class="btn btn-white">Discover Our Tours</a>
            </div>
        </div>
        

    <style>
        * {
            font-family: Lato;
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        .btn:visited,
        .btn:link {            
            padding: 20px 25px;
            border-radius: 30px;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: 500;
            margin-top: 40px;
            position: relative;
            transition: all 0.2s ease-in-out;            
        }
        
        .btn:hover {
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transform: scale(1.01) translateY(-7px);
        }
        
        .btn:active {
            box-shadow: 0 10px 5px rgba(0, 0, 0, 0.2);
            transform: scale(1) translateY(-3px);
        }

        .btn-white {
            background-color: white;
            color: rgba(0, 255, 98, 1);
        }

        .text-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-wrap: wrap;            
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -70%);
            
        }

        .title-main {
            color: white;
            display: block;
            text-transform: uppercase;
            font-size: 68px;
            letter-spacing: 38px;
            font-weight: 500;
        }

        .title-sub  {
            color: white;
            display: block;
            font-size: 21px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 20px;
        }

        .logo {
            width: 70px;
        }

        .logo-box {
            position: absolute;
            top: 30px;
            left: 30px;
            
        }

        .hero {            
            background-image: url("img/hero.jpg");
            min-block-size: 95vb;
            z-index: 1;
            position: relative;
            background-size: cover;
            background-repeat: no-repeat;
            clip-path: polygon(0% 0%, 0% 100%, 100% 80%, 100% 0%);
        }
        .hero::before {  
            content:"";        
            z-index: -1;
            inset: 0;
            position: absolute;
            background-image: linear-gradient(120deg,rgba(0, 255, 98, 0.7) 0%,rgba(0, 122, 73, 0.8) 100%);            
            
        }

        body {
            margin: 30px;
            background-color: rgb(240, 238, 238);
        }

    </style>
    </body>
</html>
